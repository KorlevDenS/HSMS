spring.datasource.url=jdbc:h2:mem:hsms;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/test-migration
hsms.security.token-secret=test-secret-with-at-least-32-characters
management.endpoint.health.show-components=always
management.endpoint.health.show-details=always
