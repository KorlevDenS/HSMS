spring.application.name=hsms_spring
debug=false

spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/hsms}
spring.datasource.username=${POSTGRES_USER:hsms}
spring.datasource.password=${POSTGRES_PASSWORD:hsms}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true

spring.jackson.deserialization.fail-on-missing-creator-properties=true

logging.level.org.springframework=INFO
logging.level.org.hibernate=INFO
logging.level.com.hsms.backend=INFO

server.port=8177
server.forward-headers-strategy=framework

hsms.security.allowed-origins=${HSMS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
hsms.security.token-secret=${HSMS_TOKEN_SECRET}
hsms.security.token-ttl-seconds=${HSMS_TOKEN_TTL_SECONDS:28800}
hsms.security.require-https=${HSMS_REQUIRE_HTTPS:false}

# Spring Modulith: modules are package-info.java contracts, not implicit packages.
spring.modulith.detection-strategy=explicitly-annotated

#SpringDoc /v3/api-docs endpoint is enabled by default
springdoc.api-docs.enabled=true
springdoc.api-docs.version=openapi_3_0
#SpringDoc /swagger-ui.html endpoint is enabled by default
springdoc.swagger-ui.enabled=true

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-components=always
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

management.metrics.tags.application=${spring.application.name}
management.metrics.tags.instance=${HOSTNAME:local}
management.metrics.tags.pod=${HOSTNAME:local}
