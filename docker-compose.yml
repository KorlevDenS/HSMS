  db:
    image: postgres:18.3
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - POSTGRES_DB=hsms
    volumes:
      - pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"

