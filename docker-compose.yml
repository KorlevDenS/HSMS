  spring:
    image: maven:3.9.16-eclipse-temurin-17
    working_dir: /app
    volumes:
      - ./hsms:/app
    command: mvn spring-boot:run
    environment:
      - POSTGRES_USER
      - POSTGRES_PASSWORD
      - WGMGR_DB_CONN_STR=postgresql://db:5432/hsms
    ports:
      - "8177:8177"
    depends_on:
      - db

