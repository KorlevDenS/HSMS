apiVersion: 1

groups:
  - orgId: 1
    name: HSMS Operational Alerts
    folder: HSMS
    interval: 60s
    rules:
      - uid: hsms-backend-unavailable
        title: HSMS backend unavailable
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: up{job="spring"}
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        noDataState: Alerting
        execErrState: Alerting
        for: 30s
        annotations:
          summary: Backend is unavailable
        labels:
          severity: critical

      - uid: hsms-api-slow
        title: HSMS API response time above 2 seconds
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: max(http_server_requests_seconds_max{job="spring"})
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [2]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 60s
        annotations:
          summary: API latency exceeds SRS limit
        labels:
          severity: warning

      - uid: hsms-high-cpu
        title: HSMS CPU usage above 80 percent
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: max(process_cpu_usage{job="spring"})
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0.8]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 120s
        annotations:
          summary: Backend CPU usage exceeds operational threshold
        labels:
          severity: warning

      - uid: hsms-server-errors
        title: HSMS server errors detected
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: sum(increase(http_server_requests_seconds_count{job="spring", status=~"5.."}[1m]))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 60s
        annotations:
          summary: API returned 5xx responses during the last minute
        labels:
          severity: warning

      - uid: hsms-module-health-unavailable
        title: HSMS module health-check failed
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: min(hsms_module_health{module=~"common|mission|risk|security|insurance"})
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [1]
                    type: lt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        noDataState: Alerting
        execErrState: Alerting
        for: 30s
        annotations:
          summary: At least one HSMS module reports unhealthy status
        labels:
          severity: critical

      - uid: hsms-sla-breaches
        title: HSMS incident SLA breach
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: sum(increase(hsms_incidents_sla_breached_total[5m]))
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: At least one incident breached normative response time
        labels:
          severity: critical
